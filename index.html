<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Car Animation - Right Drive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
  <div class="sky"></div>
  <div class="mountain"></div>
  
  <div class="content">
    <h1 class="title">W E L C O M E I T Z F I Z Z</h1>
    <div class="stats">
      <div class="stat">98% <span>Performance</span></div>
      <div class="stat">85% <span>Efficiency</span></div>
      <div class="stat">99% <span>Reliability</span></div>
    </div>
  </div>

  <div class="road"></div>

  <div class="car">
    <img src="https://www.pngplay.com/wp-content/uploads/13/Porsche-911-Transparent-Images.png" alt="Car">
  </div>
</section>

<section class="extra">
    <h2 class="scroll-text">KEEP SCROLLING TO DRIVE</h2>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="script.js"></script>
</body>
</html>
